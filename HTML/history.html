<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Records | Patient Monitoring System</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/HTML/style.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'accent-primary': 'var(--accent-primary)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'status-online': 'var(--status-online)',
                        'status-warning': 'var(--status-warning)',
                        'status-critical': 'var(--status-critical)',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-primary font-sans">

    <!-- Sidebar -->
    <nav id="sidebar"
        class="fixed top-0 left-0 h-screen w-72 flex flex-col z-30 transition-all duration-500 transform translate-x-0 overflow-hidden">
        
        <div class="p-8 flex items-center justify-between border-b border-white/5 bg-black/10">
            <div class="flex flex-col">
                <h2 class="text-2xl font-black tracking-tighter text-text-primary font-outfit uppercase">
                    Elder<span class="text-accent-primary">Hub</span>
                </h2>
                <span class="text-[10px] font-bold text-accent-primary uppercase tracking-[0.2em] opacity-80">Eldercare Intelligence</span>
            </div>
            <button id="sidebar-toggle-close"
                class="text-text-secondary hover:text-accent-primary transition-colors focus:outline-none xl:hidden">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="flex-grow py-8 px-4 space-y-2 overflow-y-auto">
            <p class="px-4 text-[10px] font-black text-text-secondary uppercase tracking-[0.2em] mb-4 opacity-50">Monitoring</p>
            <a href="/" class="sidebar-link flex items-center space-x-4 p-4 rounded-2xl">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="font-semibold tracking-tight">Dashboard</span>
            </a>
            <a href="/network" class="sidebar-link flex items-center space-x-4 p-4 rounded-2xl">
                <i data-lucide="activity" class="w-5 h-5"></i>
                <span class="font-semibold tracking-tight">Network Health</span>
            </a>
            <a href="/records" class="sidebar-link active flex items-center space-x-4 p-4 rounded-2xl">
                <i data-lucide="folder-kanban" class="w-5 h-5"></i>
                <span class="font-semibold tracking-tight">Health Records</span>
            </a>
        </div>

        <div class="p-6 bg-black/10 border-t border-white/5">
            <form action="/logout" method="POST" class="mb-0">
                <button type="submit"
                    class="w-full flex items-center justify-center space-x-3 p-4 rounded-2xl bg-status-critical/10 text-status-critical font-bold hover:bg-status-critical hover:text-white transition-all duration-300">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>DISCONNECT</span>
                </button>
            </form>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content" class="ml-72 min-h-screen p-4 xl:p-10 transition-all duration-500">

        <!-- Top Navigation -->
        <nav class="nav-pill mb-10 px-8 py-5 rounded-3xl flex justify-between items-center animate-fade-in relative z-20">
            <div class="flex items-center space-x-8">
                <button id="sidebar-toggle-open"
                    class="text-text-secondary hover:text-accent-primary transition-colors focus:outline-none">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center space-x-3 bg-status-online/10 px-4 py-2 rounded-full border border-status-online/20">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-status-online opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-status-online"></span>
                    </span>
                    <span id="system-status" class="text-[10px] font-black text-status-online uppercase tracking-widest">
                        Node Active
                    </span>
                </div>
            </div>

            <div class="flex items-center space-x-8">
                <div class="text-text-secondary font-bold text-xs tracking-widest hidden lg:block uppercase opacity-70">
                    System Time: <span id="utility-time" class="text-accent-primary ml-1">--:--:--</span>
                </div>

                <div class="h-8 w-[1px] bg-white/10 mx-2"></div>

                <div class="flex items-center space-x-4">
                    <i data-lucide="sun" class="w-4 h-4 text-text-secondary"></i>
                    <label for="theme-toggle" class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="theme-toggle" class="sr-only peer">
                        <div class="w-12 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-800 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-accent-primary">
                        </div>
                    </label>
                    <i data-lucide="moon" class="w-4 h-4 text-text-secondary"></i>
                </div>
            </div>
        </nav>

        <header class="mb-12 animate-fade-in" style="animation-delay: 0.1s;">
            <p class="text-[10px] font-black text-accent-primary uppercase tracking-[0.3em] mb-2 opacity-80">Data Stream Archives</p>
            <h1 class="text-5xl font-black text-text-primary font-outfit tracking-tight uppercase">Health records</h1>
        </header>

        <main class="animate-fade-in" style="animation-delay: 0.2s;">
            <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] relative overflow-hidden">
                
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                    <div class="flex items-center space-x-4">
                        <div class="p-3 bg-accent-primary/10 rounded-2xl text-accent-primary">
                            <i data-lucide="search" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-xl font-black text-text-primary font-outfit uppercase tracking-tight">Universal Search</h2>
                    </div>
                    
                    <div class="relative w-full md:w-96">
                        <input id="searchInput" type="text" placeholder="Filter by name, status, or date..." 
                            class="w-full pl-6 pr-12 py-4 bg-black/10 border border-white/5 rounded-2xl text-sm text-text-primary placeholder:text-text-secondary/50 focus:ring-2 focus:ring-accent-primary/50 focus:outline-none transition-all duration-300">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary opacity-50">
                            <i data-lucide="filter" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-white/5">
                                <th class="pb-6 pl-4 text-[10px] font-black text-text-secondary uppercase tracking-widest opacity-60">Patient</th>
                                <th class="pb-6 text-[10px] font-black text-text-secondary uppercase tracking-widest opacity-60">Cardiac / O₂</th>
                                <th class="pb-6 text-[10px] font-black text-text-secondary uppercase tracking-widest opacity-60">Temp</th>
                                <th class="pb-6 text-[10px] font-black text-text-secondary uppercase tracking-widest opacity-60">Emotion</th>
                                <th class="pb-6 text-[10px] font-black text-text-secondary uppercase tracking-widest opacity-60">Safety Status</th>
                                <th class="pb-6 text-[10px] font-black text-text-secondary uppercase tracking-widest opacity-60">Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTable" class="divide-y divide-white/5">
                            <!-- Records will be injected here -->
                        </tbody>
                    </table>
                </div>

                <div id="loading-overlay" class="absolute inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center transition-opacity duration-300">
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 border-4 border-accent-primary/20 border-t-accent-primary rounded-full animate-spin"></div>
                        <p class="mt-4 text-[10px] font-black text-accent-primary uppercase tracking-widest">Querying Neural Core...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const tableBody = document.getElementById('recordsTable');
        const searchInput = document.getElementById('searchInput');
        const loadingOverlay = document.getElementById('loading-overlay');
        let allRecords = [];

        function updateUtilityTime() {
            const timeEl = document.getElementById('utility-time');
            if (timeEl) timeEl.innerText = new Date().toLocaleTimeString();
        }

        /* UI State Management */
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
                if (themeToggle) themeToggle.checked = false;
            } else {
                document.documentElement.classList.add('dark');
                if (themeToggle) themeToggle.checked = true;
            }
        }
        if (themeToggle) {
            themeToggle.addEventListener('change', () => {
                if (themeToggle.checked) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            });
        }

        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const toggleOpenBtn = document.getElementById('sidebar-toggle-open');
        const toggleCloseBtn = document.getElementById('sidebar-toggle-close');
        let sidebarOpen = true;

        function initializeSidebar() {
            if (window.innerWidth < 1280) {
                sidebarOpen = false;
                sidebar.classList.add('-translate-x-full');
                mainContent.classList.remove('ml-72');
                mainContent.classList.add('ml-0');
            }
        }

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            sidebar.classList.toggle('-translate-x-full');
            if (sidebarOpen) {
                mainContent.classList.add('ml-72');
                mainContent.classList.remove('ml-0');
            } else {
                mainContent.classList.remove('ml-72');
                mainContent.classList.add('ml-0');
            }
            setTimeout(() => window.dispatchEvent(new Event('resize')), 500);
        }
        
        toggleOpenBtn.addEventListener('click', toggleSidebar);
        toggleCloseBtn.addEventListener('click', toggleSidebar);
        initializeSidebar();

        /* Data Fetching */
        async function loadAllRecords() {
            try {
                const res = await fetch('/api/history_all');
                if (!res.ok) throw new Error('Query Failed');
                const data = await res.json();
                allRecords = data.records || [];
                
                allRecords.sort((a, b) => new Date(b._server_timestamp) - new Date(a._server_timestamp));
                allRecords = allRecords.slice(0, 100);
                
                renderTable(allRecords);
                if (loadingOverlay) loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
            } catch (error) {
                console.error('Error:', error);
                tableBody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-status-critical font-bold uppercase tracking-widest text-xs">Connectivity Loss: Records Unavailable</td></tr>`;
            }
        }

        function renderTable(records) {
            tableBody.innerHTML = '';
            
            if (records.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-text-secondary opacity-50 uppercase tracking-widest text-[10px] font-black">No sequential data found</td></tr>`;
                return;
            }

            records.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = 'group hover:bg-white/5 transition-all duration-300';
                
                const hrValue = r.heart_rate ?? 0;
                const hrStatus = (hrValue < 60 || hrValue > 100) ? 'text-status-critical' : 'text-status-online';
                const o2Value = r.oxygen ?? 0;
                const o2Status = (o2Value < 95) ? 'text-status-critical' : 'text-accent-primary';
                
                const tempValue = r.temperature ?? 0;
                const tempStatus = (tempValue < 36.1 || tempValue > 37.2) ? 'text-status-warning' : 'text-status-online';

                let safetyText = r.fall_status || 'Normal';
                let safetyColor = 'text-status-online';
                if (safetyText.includes('Continuous')) { safetyColor = 'text-status-critical animate-pulse font-black'; safetyText = 'CRITICAL FALL'; }
                else if (safetyText.includes('FALL')) { safetyColor = 'text-status-critical font-bold'; safetyText = 'FALL DETECTED'; }
                else if (safetyText.toLowerCase() === 'no person') { safetyColor = 'text-text-secondary opacity-40'; safetyText = 'CLEAR'; }

                const emotionMap = {
                    'happiness': '😊 Happy', 'sadness': '😢 Sad', 'anger': '😡 Angry',
                    'surprise': '😲 Surprised', 'fear': '😨 Fearful', 'disgust': '🤢 Disgust',
                    'neutral': '😐 Neutral', 'no face': 'Clear'
                };
                const emoLabel = emotionMap[(r.emotion || 'neutral').toLowerCase()] || r.emotion;

                const date = r._server_timestamp ? new Date(r._server_timestamp).toLocaleString('en-IN', { hour12: true }) : '---';

                tr.innerHTML = `
                    <td class="py-6 pl-4">
                        <p class="text-sm font-black text-text-primary tracking-tight uppercase">${r.patient_name || 'Anonymous'}</p>
                    </td>
                    <td class="py-6">
                        <div class="flex items-center space-x-2">
                            <span class="${hrStatus} font-black text-sm">${hrValue}</span>
                            <span class="text-[10px] text-text-secondary opacity-30">/</span>
                            <span class="${o2Status} font-black text-sm">${o2Value}%</span>
                        </div>
                    </td>
                    <td class="py-6">
                        <span class="${tempStatus} font-bold text-sm">${tempValue.toFixed(1)}°C</span>
                    </td>
                    <td class="py-6">
                        <span class="text-xs font-bold text-text-secondary uppercase tracking-tighter opacity-80">${emoLabel}</span>
                    </td>
                    <td class="py-6">
                        <span class="px-3 py-1 rounded-full bg-current/10 ${safetyColor} text-[10px] font-black uppercase tracking-widest border border-current/20">${safetyText}</span>
                    </td>
                    <td class="py-6">
                        <p class="text-[10px] font-black text-text-secondary opacity-50 uppercase tracking-widest">${date}</p>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        /* Search & Filter Logic */
        searchInput.addEventListener('input', e => {
            const q = e.target.value.toLowerCase().trim();
            if (!q) { renderTable(allRecords); return; }

            const filtered = allRecords.filter(r => {
                const searchable = [
                    r.patient_name, r.heart_rate, r.oxygen, 
                    r.temperature, r.emotion, r.fall_status, r.stage
                ].join(" ").toLowerCase();
                return searchable.includes(q);
            });
            renderTable(filtered);
        });

        /* Post-init */
        lucide.createIcons();
        updateUtilityTime();
        setInterval(updateUtilityTime, 1000);
        applyTheme();
        loadAllRecords();
        setInterval(loadAllRecords, 10000); // Auto-refresh data every 10s
    </script>
</body>

</html>
