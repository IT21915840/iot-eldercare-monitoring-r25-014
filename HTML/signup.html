<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Patient Monitoring System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/HTML/style.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': 'var(--bg-primary)',
                        'accent-primary': 'var(--accent-primary)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary text-text-primary flex items-center justify-center min-h-screen p-4 overflow-hidden relative transition-colors duration-300">
    
    <!-- Theme Toggle (Top Right) -->
    <button id="theme-toggle" class="absolute top-6 right-8 p-3 rounded-full bg-black/5 dark:bg-white/10 text-text-secondary hover:text-accent-primary transition-colors focus:outline-none z-20 hover-glow">
        <i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i>
    </button>

    <!-- Background Glow Entities -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-500/10 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-500/10 blur-[120px] rounded-full"></div>

    <!-- Signup Card -->
    <div class="glass-panel w-full max-w-md p-10 rounded-3xl shadow-2xl animate-fade-in relative z-10 border border-white/5">
        
        <!-- Branding/Icon -->
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <i data-lucide="user-plus" class="text-white w-8 h-8"></i>
            </div>
        </div>

        <!-- Header -->
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold tracking-tight text-text-primary font-outfit mb-2">
                Create Account
            </h2>
            <p class="text-text-secondary font-medium">
                Register as a standard viewer
            </p>
        </div>

        <!-- Signup Form -->
        <form action="/signup" method="POST" class="space-y-6">

            <!-- Error Messages -->
            <div id="error-exists" class="hidden flex items-center space-x-3 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                <span class="font-medium">Username already taken.</span>
            </div>

            <div id="error-db" class="hidden flex items-center space-x-3 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                <span class="font-medium">Database offline. Cannot register.</span>
            </div>

            <div class="space-y-4">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-bold uppercase tracking-widest text-text-secondary mb-2 ml-1">
                        Username
                    </label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-text-secondary"></i>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            class="modern-input w-full pl-12 pr-4 py-4 rounded-xl font-medium"
                            placeholder="Desired Username"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-bold uppercase tracking-widest text-text-secondary mb-2 ml-1">
                        Password
                    </label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-text-secondary"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            class="modern-input w-full pl-12 pr-12 py-4 rounded-xl font-medium"
                            placeholder="••••••••"
                        >
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary focus:outline-none hover:text-accent-primary transition-colors">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center space-x-2 group"
            >
                <span>REGISTER ACCOUNT</span>
                <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>

            <div class="text-center mt-4">
                <p class="text-text-secondary text-sm">Already have an account? 
                    <a href="/login" class="text-cyan-500 hover:text-cyan-400 font-bold hover:underline transition-colors">Log In</a>
                </p>
            </div>
        </form>

        <!-- Footer Decoration -->
        <div class="mt-10 pt-8 border-t border-white/5 flex justify-center space-x-4">
            <div class="h-1 w-8 rounded-full bg-cyan-500/30"></div>
            <div class="h-1 w-12 rounded-full bg-cyan-500"></div>
            <div class="h-1 w-8 rounded-full bg-cyan-500/30"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'exists') {
                document.getElementById('error-exists').classList.remove('hidden');
            }
            if (urlParams.get('error') === 'db_offline') {
                document.getElementById('error-db').classList.remove('hidden');
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        /* Theme */
        const themeToggle = document.getElementById('theme-toggle');
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            themeToggle.innerHTML = isDark ? '<i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>' : '<i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i>';
            lucide.createIcons();
        }
        function applyTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
            updateThemeIcon();
        }
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateThemeIcon();
            });
        }
        applyTheme();

        /* Password Toggle */
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'text' ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' : '<i data-lucide="eye" class="w-5 h-5"></i>';
                lucide.createIcons();
            });
        }
    </script>
</body>
</html>
