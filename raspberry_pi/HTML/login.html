<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Configuration (Copied from index.html for consistency) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'background': '#0a1128',
                        'card-bg': 'rgba(12, 18, 40, 0.7)',
                        'accent-cyan': '#00e4ff',
                        'critical-red': '#ff4d4d',
                        'normal-green': '#00ff80',
                    },
                    keyframes: {
                        pulseNeon: {
                            '0%, 100%': { boxShadow: '0 0 5px #00e4ff, 0 0 0px #00e4ff' },
                            '50%': { boxShadow: '0 0 10px #00e4ff, 0 0 20px #00e4ff' },
                        }
                    },
                    animation: {
                        'neon-pulse': 'pulseNeon 3s ease-in-out infinite',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles (Copied from index.html for consistency) -->
    <style>
        body {
            background-color: #0a1128; /* Deep Blue Background */
            color: #e0e7ff; /* Light, digital text color */
            font-family: 'Inter', sans-serif;
        }

        /* Glassmorphism Card Effect */
        .glass-card {
            background-color: rgba(12, 18, 40, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            transition: transform 0.25s ease-in-out, box-shadow 0.25s ease-in-out;
        }
    </style>
</head>
<body class="bg-background font-sans flex items-center justify-center min-h-screen p-4">

    <!-- Login Card -->
    <div class="glass-card w-full max-w-md p-8 rounded-xl shadow-2xl animate-fade-in">

        <!-- Header Text (from screenshot) -->
        <h2 class="text-3xl font-thin tracking-widest text-white text-center">
            Here you can Login
        </h2>
        <p class="text-center text-accent-cyan mb-8">
            Let's join us :)
        </p>

        <!-- Login Form -->
        <form action="/login" method="POST">

            <!-- Error Message (Styled to match theme) -->
            <div id="error-message" class="hidden text-center mb-4 p-3 rounded-lg bg-critical-red/20 text-critical-red border border-critical-red/50">
                Invalid username or password.
            </div>

            <!-- Username Field (Changed from Email to match server) -->
            <div class="mb-5">
                <label for="username" class="block text-sm font-medium text-white/70 mb-2">
                    Username
                </label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full px-4 py-3 bg-background border border-white/20 rounded-lg text-white/90 focus:ring-2 focus:ring-accent-cyan focus:border-accent-cyan focus:outline-none transition duration-200"
                    placeholder="admin"
                >
            </div>

            <!-- Password Field -->
            <div class="mb-8">
                <label for="password" class="block text-sm font-medium text-white/70 mb-2">
                    Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full px-4 py-3 bg-background border border-white/20 rounded-lg text-white/90 focus:ring-2 focus:ring-accent-cyan focus:border-accent-cyan focus:outline-none transition duration-200"
                    placeholder="password"
                >
            </div>

            <!-- Submit Button (Styled with accent color) -->
            <button
                type="submit"
                class="w-full bg-accent-cyan/80 text-background font-bold py-3 px-4 rounded-lg hover:bg-accent-cyan focus:outline-none focus:ring-4 focus:ring-accent-cyan/30 transition duration-300 transform hover:scale-[1.02]"
            >
                LOGIN
            </button>
        </form>
    </div>

    <script>
        // Check for the error query parameter and show the error message
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                document.getElementById('error-message').classList.remove('hidden');
            }
        };
    </script>

</body>
</html>
